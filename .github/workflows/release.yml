name: Release

on:
  push:
    branches: [master]
    tags: ["v*"]
    paths:
      - "**.go"
      - "go.mod"
      - "go.sum"
      - ".goreleaser.yml"
      - ".github/workflows/release.yml"

permissions:
  contents: write

jobs:
  tag:
    if: github.ref_type == 'branch'
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.bump.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Bump patch version
        id: bump
        run: |
          latest=$(git tag -l 'v*' --sort=-v:refname | head -n1)
          if [ -z "$latest" ]; then
            next="v0.1.0"
          else
            major=$(echo "$latest" | cut -d. -f1)
            minor=$(echo "$latest" | cut -d. -f2)
            patch=$(echo "$latest" | cut -d. -f3)
            next="${major}.${minor}.$((patch + 1))"
          fi
          git tag "$next"
          git push origin "$next"
          echo "tag=$next" >> "$GITHUB_OUTPUT"

  release:
    if: always() && (needs.tag.result == 'success' || github.ref_type == 'tag')
    needs: [tag]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ needs.tag.outputs.tag || github.ref }}

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Set goreleaser tag
        run: |
          TAG="${{ needs.tag.outputs.tag || github.ref_name }}"
          git tag -f "$TAG" HEAD 2>/dev/null || true
          echo "GORELEASER_CURRENT_TAG=$TAG" >> "$GITHUB_ENV"

      - uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN || secrets.GITHUB_TOKEN }}
